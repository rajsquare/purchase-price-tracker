name: Deploy Vite App

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

          VITE_PRICELIST_FIREBASE_API_KEY: ${{ secrets.VITE_PRICELIST_FIREBASE_API_KEY }}
          VITE_PRICELIST_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_PRICELIST_FIREBASE_AUTH_DOMAIN }}
          VITE_PRICELIST_FIREBASE_PROJECT_ID: ${{ secrets.VITE_PRICELIST_FIREBASE_PROJECT_ID }}
          VITE_PRICELIST_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_PRICELIST_FIREBASE_STORAGE_BUCKET }}
          VITE_PRICELIST_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_PRICELIST_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_PRICELIST_FIREBASE_APP_ID: ${{ secrets.VITE_PRICELIST_FIREBASE_APP_ID }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    needs: build

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
